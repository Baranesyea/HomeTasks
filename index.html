<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0f172a" />
<title>מְשִׂימוֹת הַבַּיִת</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icon.svg" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="tasks.js?v=9"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;900&display=swap');
  html, body { font-family: 'Heebo', system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
  body { background: #ffffff; color: #0f172a; }
  .col-card { transition: background 250ms ease, border-color 250ms ease, transform 200ms ease; }
  .col-card.done { animation: cardWin 600ms ease; }
  @keyframes cardWin { 0% { transform: scale(1); } 50% { transform: scale(1.04); } 100% { transform: scale(1); } }
  .section-done { animation: sectionPulse 1.4s ease-in-out infinite; }
  @keyframes sectionPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.35); } 50% { box-shadow: 0 0 0 12px rgba(34, 197, 94, 0); } }
  .task-row { user-select: none; }
  .task-row input[type="checkbox"] { width: 30px; height: 30px; cursor: pointer; accent-color: #16a34a; flex-shrink: 0; }
  .task-row label { cursor: pointer; flex: 1; font-size: 1.1rem; line-height: 1.7; }
  .task-row.checked label { text-decoration: line-through; opacity: 0.45; }
  .confetti-piece { position: fixed; width: 10px; height: 14px; top: -20px; opacity: 0.9; z-index: 9999; pointer-events: none; }
  @keyframes confettiFall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
  .badge-pop { animation: badgePop 500ms cubic-bezier(0.34, 1.56, 0.64, 1); }
  @keyframes badgePop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
  .all-done-banner { background: linear-gradient(135deg, #f1f5f9, #e2e8f0); border: 2px solid #16a34a; }
  .niqqud { letter-spacing: 0.01em; }
</style>
</head>
<body class="min-h-screen pb-12 niqqud">
<div class="max-w-7xl mx-auto px-3 sm:px-6 pt-6">

  <header class="mb-6 text-center">
    <h1 class="text-3xl sm:text-4xl font-black text-slate-900 mb-1">מְשִׂימוֹת הַבַּיִת</h1>
    <p id="date-line" class="text-base sm:text-lg text-slate-700 font-medium" aria-live="polite"></p>
    <p class="text-xs text-slate-500 mt-1">רְשִׁימָה חֲדָשָׁה נוֹצֶרֶת כָּל בּוֹקֶר בְּ-06:00 · <button id="manual-reset" class="underline hover:text-slate-700">אִיפּוּס יָדָנִי</button> · <a href="admin.html" class="underline hover:text-slate-700">מנהל</a></p>
    <p class="text-xs mt-1">
      <button id="sync-now-btn" class="underline">🔄 סנכרן עכשיו</button>
      · <span id="sync-status" class="text-slate-500">לא מוגדר ענן</span>
      · <span id="sync-time" class="text-slate-400 text-[10px]"></span>
    </p>
  </header>

  <div id="setup-toast" class="hidden fixed top-4 left-1/2 -translate-x-1/2 bg-emerald-600 text-white font-bold px-5 py-3 rounded-2xl shadow-lg z-50">✅ מסונכרן עם הענן</div>

  <div id="all-done" class="hidden all-done-banner rounded-3xl p-6 text-center mb-6 shadow-lg">
    <div class="text-4xl mb-2">🌟</div>
    <div class="text-2xl font-black text-slate-900">יוֹם מְעוּלֶּה! כֻּלָּם סִיְּימוּ הַכֹּל</div>
    <div class="text-slate-700 mt-1">תִּהְיוּ גֵּאִים בְּעַצְמְכֶם 💪</div>
  </div>

  <main id="sections"></main>
</div>

<script>
// Pick up gist config from #setup=... if present (one-time handoff)
const wasSetup = consumeSetupUrl();
if (wasSetup) {
  const t = document.getElementById("setup-toast");
  t.classList.remove("hidden");
  setTimeout(() => t.classList.add("hidden"), 3000);
}

let TASKS = loadTasks();

function emptyChecked() {
  const out = {};
  for (const k of Object.keys(TASKS)) {
    out[k] = { kids: {}, general: {} };
    KIDS.forEach(kid => out[k].kids[kid] = {});
  }
  return out;
}

let state = (() => {
  const today = dateKey(getEffectiveDate());
  const existing = loadCheckedState();
  if (existing && existing.date === today) return existing;
  const fresh = { date: today, checked: emptyChecked() };
  saveCheckedState(fresh);
  return fresh;
})();

function checkDateReset() {
  const today = dateKey(getEffectiveDate());
  if (state.date !== today) {
    state = { date: today, checked: emptyChecked() };
    saveCheckedState(state);
    render();
    return true;
  }
  return false;
}

function render() {
  const date = getEffectiveDate();
  document.getElementById("date-line").textContent = formatHebrewDate(date);
  const assignments = buildAssignments(TASKS, date);
  const root = document.getElementById("sections");
  root.innerHTML = "";

  for (const sectionKey of Object.keys(TASKS)) {
    const section = TASKS[sectionKey];
    const data = assignments[sectionKey];

    const sec = document.createElement("section");
    sec.className = "mb-8 rounded-3xl p-4 sm:p-6 bg-slate-50 border border-slate-200 shadow-sm transition-colors";
    sec.dataset.section = sectionKey;

    const header = document.createElement("div");
    header.className = "flex items-center gap-3 mb-4";
    header.innerHTML = `
      <div class="text-3xl">${section.icon || ""}</div>
      <div class="min-w-0">
        <h2 class="text-xl sm:text-2xl font-black text-slate-900">${section.title}</h2>
        ${section.subtitle ? `<p class="text-sm text-slate-600">${section.subtitle}</p>` : ""}
      </div>
      <div class="ms-auto" data-role="section-badge"></div>
    `;
    sec.appendChild(header);

    const hasGeneral = data.general.length > 0;
    const grid = document.createElement("div");
    grid.className = `grid grid-cols-1 sm:grid-cols-2 ${hasGeneral ? 'lg:grid-cols-5' : 'lg:grid-cols-4'} gap-3`;

    KIDS.forEach(kid => {
      grid.appendChild(buildColumn({
        title: kid, kid, scope: "kids", sectionKey,
        items: data.perKid[kid],
      }));
    });

    if (hasGeneral) {
      grid.appendChild(buildColumn({
        title: GENERAL_LABEL, kid: null, scope: "general", sectionKey,
        items: data.general, isGeneral: true,
      }));
    }

    sec.appendChild(grid);
    root.appendChild(sec);
  }
  updateBadges();
}

function buildColumn({ title, kid, scope, sectionKey, items, isGeneral }) {
  const card = document.createElement("div");
  card.className = `col-card rounded-2xl p-3 border-2 bg-white border-slate-300 ${isGeneral ? 'border-dashed' : ''}`;
  if (kid) card.dataset.kid = kid;
  if (isGeneral) card.dataset.general = "1";

  const head = document.createElement("div");
  head.className = "flex items-center justify-between mb-2";
  head.innerHTML = `
    <div class="font-black text-lg text-slate-900">${title}</div>
    <div data-role="col-badge"></div>
  `;
  card.appendChild(head);

  if (items.length === 0) {
    const none = document.createElement("div");
    none.className = "text-sm text-slate-400 italic py-2";
    none.textContent = "אֵין מְשִׂימוֹת מְיוּחָדוֹת 🎉";
    card.appendChild(none);
  } else {
    items.forEach(taskName => card.appendChild(buildTaskRow(sectionKey, scope, kid, taskName)));
  }
  return card;
}

function buildTaskRow(sectionKey, scope, kid, taskName) {
  const row = document.createElement("div");
  row.className = "task-row flex items-center gap-3 py-1.5";
  const id = `cb-${sectionKey}-${scope}-${kid || "_"}-${taskName}`.replace(/\s+/g, "_");
  const checked = isChecked(sectionKey, scope, kid, taskName);
  if (checked) row.classList.add("checked");
  const cb = document.createElement("input");
  cb.type = "checkbox";
  cb.id = id;
  cb.checked = checked;
  cb.addEventListener("change", () => onToggle(sectionKey, scope, kid, taskName, cb.checked, row));
  const label = document.createElement("label");
  label.htmlFor = id;
  label.textContent = taskName;
  row.appendChild(cb);
  row.appendChild(label);
  return row;
}

function isChecked(sectionKey, scope, kid, taskName) {
  const s = state.checked[sectionKey];
  if (!s) return false;
  if (scope === "kids") return !!(s.kids[kid] && s.kids[kid][taskName]);
  return !!s.general[taskName];
}

function onToggle(sectionKey, scope, kid, taskName, val, row) {
  if (!state.checked[sectionKey]) state.checked[sectionKey] = { kids: {}, general: {} };
  if (scope === "kids") {
    state.checked[sectionKey].kids[kid] = state.checked[sectionKey].kids[kid] || {};
    state.checked[sectionKey].kids[kid][taskName] = val;
  } else {
    state.checked[sectionKey].general[taskName] = val;
  }
  saveCheckedState(state);
  row.classList.toggle("checked", val);
  if (val) playPop();
  updateBadges();
}

function isKidDone(sectionKey, kid, assignments) {
  const tasks = assignments[sectionKey].perKid[kid];
  if (tasks.length === 0) return true;
  return tasks.every(t => isChecked(sectionKey, "kids", kid, t));
}
function isGeneralDone(sectionKey, assignments) {
  const tasks = assignments[sectionKey].general;
  if (tasks.length === 0) return true;
  return tasks.every(t => isChecked(sectionKey, "general", null, t));
}
function isSectionDone(sectionKey, assignments) {
  return KIDS.every(k => isKidDone(sectionKey, k, assignments)) && isGeneralDone(sectionKey, assignments);
}

function updateBadges() {
  const date = getEffectiveDate();
  const assignments = buildAssignments(TASKS, date);
  let allDone = true;

  for (const sectionKey of Object.keys(TASKS)) {
    const sec = document.querySelector(`[data-section="${sectionKey}"]`);
    if (!sec) continue;
    const sectionDone = isSectionDone(sectionKey, assignments);
    if (!sectionDone) allDone = false;

    sec.classList.toggle("bg-emerald-50", sectionDone);
    sec.classList.toggle("border-emerald-400", sectionDone);
    sec.classList.toggle("bg-slate-50", !sectionDone);
    sec.classList.toggle("border-slate-200", !sectionDone);
    sec.classList.toggle("section-done", sectionDone);

    const sBadge = sec.querySelector('[data-role="section-badge"]');
    sBadge.innerHTML = sectionDone
      ? `<div class="badge-pop bg-emerald-500 text-white text-sm font-bold px-3 py-1 rounded-full">✅ הוּשְׁלַם!</div>`
      : "";

    KIDS.forEach(kid => {
      const card = sec.querySelector(`[data-kid="${kid}"]`);
      if (!card) return;
      const done = isKidDone(sectionKey, kid, assignments);
      card.classList.toggle("bg-emerald-100", done);
      card.classList.toggle("border-emerald-500", done);
      card.classList.toggle("bg-white", !done);
      card.classList.toggle("border-slate-300", !done);
      card.classList.toggle("done", done);
      const badge = card.querySelector('[data-role="col-badge"]');
      badge.innerHTML = done ? `<div class="badge-pop text-2xl">✅</div>` : "";
    });

    const gen = sec.querySelector('[data-general="1"]');
    if (gen) {
      const done = isGeneralDone(sectionKey, assignments);
      gen.classList.toggle("bg-emerald-100", done);
      gen.classList.toggle("border-emerald-500", done);
      gen.classList.toggle("bg-white", !done);
      gen.classList.toggle("border-slate-300", !done);
      gen.classList.toggle("done", done);
      const badge = gen.querySelector('[data-role="col-badge"]');
      badge.innerHTML = done ? `<div class="badge-pop text-2xl">✅</div>` : "";
    }
  }

  const banner = document.getElementById("all-done");
  if (allDone && Object.keys(TASKS).length > 0) {
    if (banner.classList.contains("hidden")) {
      banner.classList.remove("hidden");
      fireConfetti();
    }
  } else {
    banner.classList.add("hidden");
  }
}

let audioCtx = null;
function playPop() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = "sine";
    o.frequency.setValueAtTime(880, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(1320, audioCtx.currentTime + 0.08);
    g.gain.setValueAtTime(0.001, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.15, audioCtx.currentTime + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
    o.start(); o.stop(audioCtx.currentTime + 0.15);
  } catch (e) {}
}

function fireConfetti() {
  const colors = ["#0f172a", "#475569", "#16a34a", "#94a3b8", "#facc15", "#0ea5e9"];
  for (let i = 0; i < 80; i++) {
    const p = document.createElement("div");
    p.className = "confetti-piece";
    p.style.left = Math.random() * 100 + "vw";
    p.style.background = colors[i % colors.length];
    p.style.transform = `rotate(${Math.random() * 360}deg)`;
    p.style.animation = `confettiFall ${1.8 + Math.random() * 1.4}s ease-in forwards`;
    p.style.animationDelay = (Math.random() * 0.4) + "s";
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 4000);
  }
}

document.getElementById("manual-reset").addEventListener("click", () => {
  if (!confirm("לאפס את כל הסימונים של היום?")) return;
  state = { date: dateKey(getEffectiveDate()), checked: emptyChecked() };
  saveCheckedState(state);
  render();
});

// ===== Sync from admin (3 mechanisms, any one is enough) =====
function reloadTasksAndRender() {
  const newJson = JSON.stringify(loadTasks());
  if (newJson === lastTasksJson) return;
  lastTasksJson = newJson;
  TASKS = JSON.parse(newJson);
  // Don't wipe checked state — orphan keys are harmless, valid checks survive
  render();
}

let lastTasksJson = JSON.stringify(TASKS);

// 1) BroadcastChannel — instant cross-tab sync
let bc = null;
try { bc = new BroadcastChannel("hometasks"); } catch (e) {}
if (bc) {
  bc.onmessage = (ev) => {
    if (!ev.data) return;
    if (ev.data.type === "tasks-updated") reloadTasksAndRender();
    else if (ev.data.type === "force-reload") location.reload();
  };
}

// 2) storage event — fallback for browsers/contexts where BroadcastChannel isn't available
window.addEventListener("storage", (e) => {
  if (e.key === TASKS_KEY) reloadTasksAndRender();
});

// 3) Polling every 3s — last-resort fallback (catches anything the others miss)
setInterval(reloadTasksAndRender, 3000);

// ===== Cross-device cloud sync via Gist =====
async function syncFromGist(showInProgress) {
  if (!hasGistConfig()) { setSyncStatus("⚪ ללא ענן"); return; }
  if (showInProgress) setSyncStatus("⏳ מסנכרן…");
  try {
    const remote = await fetchTasksFromGist();
    setSyncTime();
    if (!remote) {
      setSyncStatus("☁️ הענן ריק");
      return;
    }
    const remoteJson = JSON.stringify(remote);
    if (remoteJson === lastTasksJson) {
      setSyncStatus("☁️ מסונכרן");
      return;
    }
    saveTasks(remote);
    lastTasksJson = remoteJson;
    TASKS = remote;
    render();
    setSyncStatus("☁️ עודכן עכשיו");
  } catch (e) {
    setSyncStatus("⚠️ " + (e.message || "סנכרון נכשל"));
    console.warn("Gist sync failed:", e);
  }
}
function setSyncStatus(text) {
  const el = document.getElementById("sync-status");
  if (el) el.textContent = text;
}
function setSyncTime() {
  const el = document.getElementById("sync-time");
  if (!el) return;
  const d = new Date();
  el.textContent = `(${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}:${String(d.getSeconds()).padStart(2,"0")})`;
}
document.getElementById("sync-now-btn").addEventListener("click", () => syncFromGist(true));

if (hasGistConfig()) {
  setSyncStatus("⏳ טוען מהענן…");
  syncFromGist();
  setInterval(syncFromGist, 30_000);
  document.addEventListener("visibilitychange", () => { if (!document.hidden) syncFromGist(); });
}

render();
setInterval(checkDateReset, 60_000);

// SW disabled — kill any existing registration so iPad always loads fresh code.
// (sw.js is now a self-destruct that runs once and unregisters itself.)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(r => r.unregister().catch(() => {}));
  }).catch(() => {});
}
</script>
</body>
</html>
